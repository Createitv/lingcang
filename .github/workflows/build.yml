name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package ${{ matrix.name }} app
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            script: package:mac
            artifact_name: LingCang-macOS-x64
            artifact_path: release/LingCang-macOS-x64.zip
          - name: Windows
            os: windows-latest
            script: package:win
            artifact_name: LingCang-Windows-x64
            artifact_path: release/LingCang-Windows-x64.zip
          - name: Linux
            os: ubuntu-latest
            script: package:linux
            artifact_name: LingCang-Linux-x64
            artifact_path: release/LingCang-Linux-x64.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Package
        run: pnpm run ${{ matrix.script }}

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: LingCang-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          TITLE="LingCang ${TAG}"
          NOTES="LingCang desktop builds for ${TAG}.

          Included assets:
          - LingCang-macOS-x64.zip
          - LingCang-Windows-x64.zip
          - LingCang-Linux-x64.tar.gz"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-assets/LingCang-* --clobber
            gh release edit "${TAG}" --title "${TITLE}" --notes "${NOTES}"
          else
            gh release create "${TAG}" release-assets/LingCang-* \
              --target "${GITHUB_SHA}" \
              --title "${TITLE}" \
              --notes "${NOTES}"
          fi

  deploy-pages:
    name: Deploy landing page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build landing page
        run: |
          mkdir -p public
          cp assets/app-logo.svg public/app-logo.svg
          cp landing/index.html public/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
