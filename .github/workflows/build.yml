name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-mac:
    name: Package macOS app
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Package
        run: pnpm run package:mac

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingCang-macOS-x64
          path: release/LingCang-darwin-x64.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          ASSET="release/LingCang-darwin-x64.zip"
          TITLE="LingCang ${TAG}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ASSET}" --clobber
            gh release edit "${TAG}" \
              --title "${TITLE}" \
              --notes "LingCang macOS build for ${TAG}."
          else
            gh release create "${TAG}" "${ASSET}" \
              --target "${GITHUB_SHA}" \
              --title "${TITLE}" \
              --notes "LingCang macOS build for ${TAG}."
          fi

  deploy-pages:
    name: Deploy landing page
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build landing page
        run: |
          mkdir -p public
          cp assets/app-logo.svg public/app-logo.svg
          cp landing/index.html public/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
